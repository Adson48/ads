        .ai-controls {

        .ai-textarea {

        .ai-quick {

        .ai-chip {

            padding: 0.35rem 0.7rem;
            font-size: 0.82rem;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .ai-controls { grid-template-columns: 1fr; }
            .ai-endpoint { grid-template-columns: 1fr; }
        }

    <main class="content-empty-page">
        <section class="ai-panel">
            <div class="ai-head">

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="./assets/js/firebase-config.js?v=20260418-24"></script>
    <script src="./assets/js/script.js?v=20260418-31"></script>
    <script>
        (function() {
            var ENDPOINT_KEY = 'ma_gpt_proxy_endpoint_v1';
            var HISTORY_KEY = 'ma_gpt_chat_history_v1';
            var endpointInput = document.getElementById('gptEndpointInput');
            var saveEndpointBtn = document.getElementById('saveGptEndpointBtn');
            var statusEl = document.getElementById('gptStatus');
            var chatEl = document.getElementById('gptChat');
            var promptInput = document.getElementById('gptPromptInput');
            var sendBtn = document.getElementById('sendGptBtn');
            var clearBtn = document.getElementById('clearGptBtn');

            if (!endpointInput || !saveEndpointBtn || !statusEl || !chatEl || !promptInput || !sendBtn || !clearBtn) {
                return;
            }

            var history = [];

            var safeLoadHistory = function() {
                try {
                    var raw = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                    if (!Array.isArray(raw)) { return []; }
                    return raw.filter(function(item) {
                        return item && (item.role === 'user' || item.role === 'assistant') && typeof item.content === 'string';
                    }).slice(-24);
                } catch (e) {
                    return [];
                }
            };

            var saveHistory = function() {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(-24)));
            };

            var resolveDefaultEndpoint = function() {
                var host = String(window.location.hostname || '').toLowerCase();
                if (host.indexOf('github.io') !== -1) {
                    return 'https://ads-two-phi.vercel.app/api/chat';
                }
                return window.location.origin + '/api/chat';
            };

            var getEndpoint = function() {
                var saved = String(localStorage.getItem(ENDPOINT_KEY) || '').trim();
                return saved || resolveDefaultEndpoint();
            };

            var setStatus = function(message, type) {
                statusEl.textContent = message;
                statusEl.style.color = type === 'bad' ? '#b42318' : (type === 'good' ? '#166534' : '#7f3052');
            };

            var escapeHtml = function(text) {
                return String(text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            };

            var renderHistory = function() {
                if (!history.length) {
                    chatEl.innerHTML = '<div class="ai-msg assistant">Xin chao. Hay cau hinh endpoint va gui yeu cau de bat dau.</div>';
                    return;
                }

                chatEl.innerHTML = history.map(function(item) {
                    var cls = item.role === 'user' ? 'user' : 'assistant';
                    return '<div class="ai-msg ' + cls + '">' + escapeHtml(item.content) + '</div>';
                }).join('');
                chatEl.scrollTop = chatEl.scrollHeight;
            };

            var extractReply = function(data) {
                if (!data) { return ''; }
                if (typeof data.reply === 'string' && data.reply.trim()) { return data.reply.trim(); }
                if (typeof data.output_text === 'string' && data.output_text.trim()) { return data.output_text.trim(); }
                if (Array.isArray(data.output)) {
                    var chunks = [];
                    data.output.forEach(function(item) {
                        if (item && Array.isArray(item.content)) {
                            item.content.forEach(function(part) {
                                if (part && typeof part.text === 'string') { chunks.push(part.text); }
                            });
                        }
                    });
                    if (chunks.length) { return chunks.join('\n').trim(); }
                }
                if (data.choices && data.choices[0] && data.choices[0].message && typeof data.choices[0].message.content === 'string') {
                    return data.choices[0].message.content.trim();
                }
                return '';
            };

            var sendPrompt = async function() {
                var endpoint = getEndpoint();
                if (!endpoint) {
                    setStatus('Vui long nhap endpoint proxy truoc khi gui.', 'bad');
                    endpointInput.focus();
                    return;
                }

                var prompt = String(promptInput.value || '').trim();
                if (!prompt) {
                    setStatus('Ban chua nhap noi dung can hoi.', 'bad');
                    promptInput.focus();
                    return;
                }

                history.push({ role: 'user', content: prompt });
                renderHistory();
                saveHistory();
                promptInput.value = '';
                sendBtn.disabled = true;
                setStatus('Dang goi ChatGPT...', '');

                try {
                    var response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: prompt,
                            messages: history.slice(-12)
                        })
                    });

                    var data = await response.json().catch(function() { return {}; });
                    var reply = extractReply(data);

                    if (!response.ok || !reply) {
                        throw new Error((data && (data.error || data.message)) ? (data.error || data.message) : 'Không nhận được phản hồi hợp lệ từ endpoint.');
                    }

                    history.push({ role: 'assistant', content: reply });
                    renderHistory();
                    saveHistory();
                    setStatus('Da nhan phan hoi tu ChatGPT.', 'good');
                } catch (err) {
                    setStatus('Loi ket noi ChatGPT: ' + (err && err.message ? err.message : 'unknown'), 'bad');
                } finally {
                    sendBtn.disabled = false;
                }
            };

            endpointInput.value = String(localStorage.getItem(ENDPOINT_KEY) || '').trim() || resolveDefaultEndpoint();
            history = safeLoadHistory();
            renderHistory();
            if (endpointInput.value) {
                setStatus('Endpoint da san sang.', 'good');
            } else {
                setStatus('Dang chay tren GitHub Pages: vui long nhap endpoint backend (Vercel/Worker).', '');
            }

            saveEndpointBtn.addEventListener('click', function() {
                var endpoint = String(endpointInput.value || '').trim();
                if (!endpoint) {
                    localStorage.removeItem(ENDPOINT_KEY);
                    setStatus('Da xoa endpoint.', '');
                    return;
                }
                localStorage.setItem(ENDPOINT_KEY, endpoint);
                setStatus('Da luu endpoint thanh cong.', 'good');
            });

            sendBtn.addEventListener('click', sendPrompt);
            promptInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendPrompt();
                }
            });

            clearBtn.addEventListener('click', function() {
                history = [];
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
                setStatus('Da xoa lich su hoi dap tren trinh duyet nay.', '');
            });

            document.querySelectorAll('.ai-chip[data-prompt]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var content = String(btn.getAttribute('data-prompt') || '').trim();
                    if (!content) { return; }
                    promptInput.value = content;
                    promptInput.focus();
                });
            });
        })();
    </script>
